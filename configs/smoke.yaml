paths:
  species_file: species.txt

inat:
  quality_grade: research
  photo_size: original

download:
  images_per_species: 10
  candidate_multiplier: 2.0
  max_candidates_per_species: 30
  species_workers: 5
  download_workers: 10

validation:
  min_width: 224
  min_height: 224

detection:
  enable: true
  weights: models/fish-yolo.pt
  confidence: 0.25
  min_fish_area_ratio: 0.02
  crop_padding: 0.15
  allow_multiple_fish: true

clip:
  enable: true
  model: openai/clip-vit-base-patch32
  threshold: 0.05
